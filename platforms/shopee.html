<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YeeeHaul (Shopee)</title>
    <link rel="stylesheet" href="../css/platforms.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Google+Sans+Flex:opsz,wght@6..144,1..1000&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"
        integrity="sha512-Evv84Mr4kqVGRNSgIGL/F/aIDqQb7xQ2vcrdIwxfjThSH8CSR7PBEakCr51Ck+w+/U6swU2Im1vVX0SVk9ABhg=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="icon" type="image/x-icon" href="../images/Jessie.jpg" style="border-radius: 100px;">

</head>

<body>

    <div class="container">

        <!-- Profile Section -->
        <div class="profile-section">
            <img src="../images/Jessie.jpg" alt="Profile Picture" class="profile-pic">

            <h1 class="logo-text"><span style="color: #ff1900;">Yeee</span>Haul</h1>
            <img class="shopee-img" src="https://upload.wikimedia.org/wikipedia/commons/thumb/f/fe/Shopee.svg/3840px-Shopee.svg.png" alt="">

            <p class="description">
                Welcome to YeeeHaul's <strong>Shopee</strong> Collection.<br>
                The wild west of online finds. 🤠
            </p>
            

            <div class="socials">
                <a href="https://www.youtube.com/@wumbobee" target="_blank" class="social-btn">
                    <i class="fa-brands fa-youtube" style="color: red;"></i> YouTube
                </a>
                <a href="https://www.tiktok.com/@caridapet" target="_blank" class="social-btn">
                    <i class="fa-brands fa-tiktok"></i> TikTok
                </a>
                <a href="https://www.instagram.com/caridapet" target="_blank" class="social-btn">
                    <i class="fa-brands fa-instagram" style="color: #E1306C;"></i> Instagram
                </a>
                <a href="https://www.facebook.com/profile.php?id=61591306735268" target="_blank" class="social-btn">
                    <i class="fa-brands fa-facebook" style="color: #1877F2;"></i> Facebook
                </a>
            </div>
            
        </div>

        <!-- Search -->
        <span style="font-size: 13px; color: var(--stone);">All products in videos <i
                class="fa-solid fa-arrow-down" style="margin-left: 4px;"></i></span>
        <div class="search-section">
            <i class="fa-solid fa-magnifying-glass"></i>
            <input type="text" id="searchInput" placeholder="Search product...">
        </div>

        <!-- Products -->
        <div id="productsContainer" class="products-grid"></div>

    </div>

    <footer class="footer">
        <div class="footer-main">
            <div class="footer-logo">
                <img src="../images/Jessie.jpg" alt="CariDapet">
                <span class="footer-logo-name"><span>Yeee</span>Haul</span>
            </div>
            <div class="footer-socials">
                <a href="https://www.youtube.com/@wumbobee" target="_blank" class="footer-social-btn"><i
                        class="fa-brands fa-youtube" style="color: red;"></i></a>
                <a href="https://www.tiktok.com/@caridapet" target="_blank" class="footer-social-btn"><i
                        class="fa-brands fa-tiktok"></i></a>
                <a href="https://www.instagram.com/caridapet" target="_blank" class="footer-social-btn"><i
                        class="fa-brands fa-instagram" style="color: #E1306C;"></i></a>
                <a href="https://www.facebook.com/profile.php?id=61591306735268" target="_blank"
                    class="footer-social-btn"><i class="fa-brands fa-facebook" style="color: #1877F2;"></i></a>
            </div>
        </div>
        <hr class="footer-divider">
        <p class="footer-copy">Copyright © 2026 YeeeHaul. All rights reserved.</p>
    </footer>

    <script src="../js/shopee-products.js"></script>
    <script src="../js/script.js"></script>

</body>

</html>
